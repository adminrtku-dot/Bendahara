<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rekap Keuangan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#eef2f6] min-h-screen flex justify-center">
  <div id="app" class="w-full max-w-[390px] h-[100dvh] bg-[#fcfcfc] shadow-2xl relative flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="sticky top-0 z-30 bg-emerald-600 text-white px-4 py-3.5 flex items-center justify-between">
      <h1 class="text-[18px] font-semibold tracking-tight flex items-center gap-2.5">
        <div class="w-8 h-8 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur">
          <i data-lucide="wallet" class="w-[18px] h-[18px]"></i>
        </div>
        Rekap Keuangan
      </h1>
      <button id="exportBtn" class="w-9 h-9 rounded-full hover:bg-white/15 active:scale-95 flex items-center justify-center transition">
        <i data-lucide="file-down" class="w-5 h-5"></i>
      </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto scrollbar-hide px-4 pb-24 bg-[#fcfcfc]">
      <!-- Saldo Card -->
      <div class="mt-4 relative">
        <div class="bg-gradient-to-br from-emerald-600 to-emerald-500 rounded-[28px] p-5 text-white shadow-xl shadow-emerald-600/20 relative overflow-hidden">
          <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
          <div class="absolute -left-8 -bottom-8 w-32 h-32 bg-black/10 rounded-full blur-xl"></div>
          <div class="relative z-10">
            <p class="text-sm font-medium opacity-90">Saldo Saat Ini</p>
            <h2 id="saldo" class="text-[34px] font-bold tracking-tight mt-1 leading-none">Rp 0</h2>
            <div class="grid grid-cols-2 gap-3 mt-5">
              <div class="bg-white/15 backdrop-blur-xl rounded-2xl p-3.5 border border-white/10">
                <div class="flex items-center gap-1.5 text-[12px] opacity-90">
                  <div class="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center">
                    <i data-lucide="arrow-down" class="w-3 h-3"></i>
                  </div>
                  Pemasukan
                </div>
                <p id="totalMasuk" class="font-semibold mt-1.5 text-[15px]">Rp 0</p>
              </div>
              <div class="bg-white/15 backdrop-blur-xl rounded-2xl p-3.5 border border-white/10">
                <div class="flex items-center gap-1.5 text-[12px] opacity-90">
                  <div class="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center">
                    <i data-lucide="arrow-up" class="w-3 h-3"></i>
                  </div>
                  Pengeluaran
                </div>
                <p id="totalKeluar" class="font-semibold mt-1.5 text-[15px]">Rp 0</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Filter -->
      <div class="flex items-center justify-between mt-6 mb-3">
        <h3 class="font-semibold text-[15px] text-gray-800">Transaksi</h3>
        <div class="relative">
          <input type="month" id="filterBulan" class="bg-white border border-gray-200 rounded-xl pl-9 pr-3 py-2 text-[13px] font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 shadow-sm">
          <i data-lucide="calendar" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
        </div>
      </div>

      <!-- List Transaksi -->
      <div id="listTransaksi" class="space-y-2.5"></div>
      
      <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-center">
        <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center mb-3">
          <i data-lucide="inbox" class="w-8 h-8 text-gray-400"></i>
        </div>
        <p class="text-gray-900 font-medium">Belum ada transaksi</p>
        <p class="text-gray-500 text-sm mt-1">Tap tombol + untuk menambah</p>
      </div>
    </main>

    <!-- FAB -->
    <button id="fab" class="absolute bottom-6 right-5 w-[56px] h-[56px] bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white rounded-2xl shadow-xl shadow-emerald-600/30 flex items-center justify-center transition-all z-20">
      <i data-lucide="plus" class="w-7 h-7"></i>
    </button>

    <!-- Sync Indicator -->
    <div id="syncStatus" class="absolute top-[60px] left-1/2 -translate-x-1/2 bg-gray-900 text-white text-[11px] px-3 py-1 rounded-full opacity-0 transition-opacity pointer-events-none z-40">
      Tersimpan offline
    </div>
  </div>

  <!-- Modal Bottom Sheet -->
  <div id="modal" class="fixed inset-0 z-50 hidden">
    <div id="backdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
    <div class="absolute inset-0 flex justify-center items-end pointer-events-none">
      <div id="sheet" class="pointer-events-auto w-full max-w-[390px] bg-white rounded-t-[32px] shadow-2xl translate-y-full transition-transform duration-300 ease-out max-h-[88vh] flex flex-col">
        <div class="sticky top-0 bg-white px-5 pt-3 pb-4 border-b border-gray-100 rounded-t-[32px]">
          <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
          <div class="flex items-center justify-between">
            <h3 class="text-[17px] font-semibold text-gray-900">Tambah Transaksi</h3>
            <button id="closeModal" class="w-8 h-8 -mr-1 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500 transition">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
        
        <form id="formTransaksi" class="px-5 py-5 space-y-4 overflow-y-auto">
          <!-- Tanggal -->
          <div>
            <label class="text-[13px] font-medium text-gray-700 mb-1.5 block">Tanggal</label>
            <div class="relative">
              <input type="date" id="tanggal" required class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-3 py-2.5 text-[14px] focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 focus:bg-white transition">
              <i data-lucide="calendar-days" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>
          </div>

          <!-- Tipe -->
          <div>
            <label class="text-[13px] font-medium text-gray-700 mb-1.5 block">Tipe</label>
            <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-xl">
              <label class="cursor-pointer">
                <input type="radio" name="tipe" value="masuk" class="sr-only peer" checked>
                <div class="peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:shadow-md bg-transparent text-gray-600 rounded-lg py-2.5 text-center text-[14px] font-medium transition-all flex items-center justify-center gap-1.5">
                  <i data-lucide="arrow-down-left" class="w-4 h-4"></i>
                  Pemasukan
                </div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="tipe" value="keluar" class="sr-only peer">
                <div class="peer-checked:bg-red-500 peer-checked:text-white peer-checked:shadow-md bg-transparent text-gray-600 rounded-lg py-2.5 text-center text-[14px] font-medium transition-all flex items-center justify-center gap-1.5">
                  <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                  Pengeluaran
                </div>
              </label>
            </div>
          </div>

          <!-- Kategori -->
          <div>
            <label class="text-[13px] font-medium text-gray-700 mb-1.5 block">Kategori</label>
            <div class="relative">
              <select id="kategori" required class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-9 py-2.5 text-[14px] appearance-none focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 focus:bg-white transition">
              </select>
              <i data-lucide="tag" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
              <i data-lucide="chevron-down" class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
            </div>
          </div>

          <!-- Keterangan -->
          <div>
            <label class="text-[13px] font-medium text-gray-700 mb-1.5 block">Keterangan</label>
            <input type="text" id="keterangan" placeholder="Contoh: Makan siang" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-2.5 text-[14px] focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 focus:bg-white transition">
          </div>

          <!-- Jumlah -->
          <div>
            <label class="text-[13px] font-medium text-gray-700 mb-1.5 block">Jumlah</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 font-medium text-[14px]">Rp</span>
              <input type="text" id="jumlah" inputmode="numeric" placeholder="0" required class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-3.5 py-2.5 text-[16px] font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 focus:bg-white transition">
            </div>
          </div>

          <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-[0.98] text-white rounded-xl py-3.5 font-semibold text-[15px] shadow-lg shadow-emerald-600/20 transition-all mt-2">
            Simpan Transaksi
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 -translate-y-4 bg-gray-900 text-white px-4 py-2.5 rounded-full text-[13px] font-medium shadow-xl opacity-0 pointer-events-none transition-all duration-300 z-[100] flex items-center gap-2">
    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>
    <span id="toastText">Berhasil disimpan</span>
  </div>

<script>
const GAS_URL = ''; // Ganti dengan URL Web App GAS untuk sync ke Google Sheet

const STORAGE_KEY = 'keuangan_data';
let keuanganData = [];

const kategoriMasuk = ['Gaji', 'Usaha', 'Lainnya'];
const kategoriKeluar = ['Makan', 'Transport', 'Belanja', 'Tagihan', 'Lainnya'];

const $ = (id) => document.getElementById(id);
const saldoEl = $('saldo');
const totalMasukEl = $('totalMasuk');
const totalKeluarEl = $('totalKeluar');
const listEl = $('listTransaksi');
const emptyEl = $('emptyState');
const filterBulan = $('filterBulan');
const modal = $('modal');
const backdrop = $('backdrop');
const sheet = $('sheet');
const fab = $('fab');
const closeModalBtn = $('closeModal');
const form = $('formTransaksi');
const tanggalInput = $('tanggal');
const kategoriSelect = $('kategori');
const keteranganInput = $('keterangan');
const jumlahInput = $('jumlah');
const exportBtn = $('exportBtn');
const toast = $('toast');
const toastText = $('toastText');
const syncStatus = $('syncStatus');

function init() {
  loadData();
  setupEvents();
  setCurrentMonth();
  updateKategori();
  render();
  lucide.createIcons();
  if (GAS_URL) loadFromGAS();
}

function getInitialData() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  return [
    { id: '1', tanggal: `${y}-${m}-02`, tipe: 'masuk', kategori: 'Gaji', keterangan: 'Gaji bulanan', jumlah: 8500000 },
    { id: '2', tanggal: `${y}-${m}-03`, tipe: 'keluar', kategori: 'Tagihan', keterangan: 'Listrik & Internet', jumlah: 650000 },
    { id: '3', tanggal: `${y}-${m}-05`, tipe: 'keluar', kategori: 'Belanja', keterangan: 'Belanja bulanan', jumlah: 1250000 },
    { id: '4', tanggal: `${y}-${m}-10`, tipe: 'masuk', kategori: 'Usaha', keterangan: 'Jual online', jumlah: 1500000 },
    { id: '5', tanggal: `${y}-${m}-15`, tipe: 'keluar', kategori: 'Makan', keterangan: 'Makan siang kantor', jumlah: 75000 },
  ];
}

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { keuanganData = JSON.parse(saved); } catch { keuanganData = getInitialData(); }
  } else {
    keuanganData = getInitialData();
    saveData(false);
  }
}

function saveData(showToast = true) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(keuanganData));
  if (showToast) showSyncStatus();
  if (GAS_URL) syncToGAS();
}

function setCurrentMonth() {
  const now = new Date();
  filterBulan.value = now.toISOString().slice(0, 7);
  tanggalInput.valueAsDate = now;
}

function setupEvents() {
  fab.addEventListener('click', openModal);
  closeModalBtn.addEventListener('click', closeModal);
  backdrop.addEventListener('click', closeModal);
  filterBulan.addEventListener('change', render);
  exportBtn.addEventListener('click', exportPDF);
  form.addEventListener('submit', handleSubmit);
  
  document.querySelectorAll('input[name="tipe"]').forEach(r => {
    r.addEventListener('change', updateKategori);
  });

  jumlahInput.addEventListener('input', (e) => {
    let val = e.target.value.replace(/[^0-9]/g, '');
    if (val) e.target.value = formatRupiahInput(val);
    else e.target.value = '';
  });
}

function updateKategori() {
  const tipe = document.querySelector('input[name="tipe"]:checked').value;
  const list = tipe === 'masuk' ? kategoriMasuk : kategoriKeluar;
  kategoriSelect.innerHTML = list.map(k => `<option value="${k}">${k}</option>`).join('');
}

function openModal() {
  modal.classList.remove('hidden');
  setTimeout(() => {
    backdrop.classList.remove('opacity-0');
    sheet.classList.remove('translate-y-full');
  }, 10);
  tanggalInput.valueAsDate = new Date();
  form.reset();
  updateKategori();
  setTimeout(() => keteranganInput.focus(), 300);
}

function closeModal() {
  backdrop.classList.add('opacity-0');
  sheet.classList.add('translate-y-full');
  setTimeout(() => modal.classList.add('hidden'), 300);
}

function handleSubmit(e) {
  e.preventDefault();
  const jumlah = parseInt(jumlahInput.value.replace(/\./g, '')) || 0;
  if (jumlah <= 0) return showToast('Jumlah harus lebih dari 0', true);

  const data = {
    id: Date.now().toString(),
    tanggal: tanggalInput.value,
    tipe: document.querySelector('input[name="tipe"]:checked').value,
    kategori: kategoriSelect.value,
    keterangan: keteranganInput.value.trim(),
    jumlah
  };

  keuanganData.unshift(data);
  saveData();
  render();
  closeModal();
  showToast('Transaksi berhasil ditambah');
}

function deleteTransaksi(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    card.style.transition = 'all 0.25s ease';
    card.style.opacity = '0';
    card.style.transform = 'translateX(-20px)';
  }
  setTimeout(() => {
    keuanganData = keuanganData.filter(t => t.id !== id);
    saveData();
    render();
    showToast('Transaksi dihapus');
  }, 200);
}

function render() {
  const bulan = filterBulan.value;
  const filtered = keuanganData
    .filter(t => t.tanggal.startsWith(bulan))
    .sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

  const totalMasuk = filtered.filter(t => t.tipe === 'masuk').reduce((s, t) => s + t.jumlah, 0);
  const totalKeluar = filtered.filter(t => t.tipe === 'keluar').reduce((s, t) => s + t.jumlah, 0);
  const saldo = totalMasuk - totalKeluar;

  saldoEl.textContent = formatRupiah(saldo);
  totalMasukEl.textContent = formatRupiah(totalMasuk);
  totalKeluarEl.textContent = formatRupiah(totalKeluar);

  if (filtered.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    emptyEl.classList.add('flex');
  } else {
    emptyEl.classList.add('hidden');
    emptyEl.classList.remove('flex');
    listEl.innerHTML = filtered.map(t => {
      const isMasuk = t.tipe === 'masuk';
      const date = new Date(t.tanggal);
      const tgl = date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
      const icon = getKategoriIcon(t.kategori, isMasuk);
      const color = isMasuk ? 'emerald' : 'red';
      
      return `
        <div data-id="${t.id}" class="group bg-white border border-gray-100 rounded-2xl p-3.5 shadow-sm hover:shadow-md transition-all active:scale-[0.99]">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl bg-${color}-50 flex items-center justify-center shrink-0">
              <i data-lucide="${icon}" class="w-5 h-5 text-${color}-600"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <p class="font-medium text-[14px] text-gray-900 truncate">${t.keterangan}</p>
                  <div class="flex items-center gap-2 mt-0.5">
                    <span class="text-[12px] text-gray-500">${tgl}</span>
                    <span class="text-[11px] px-1.5 py-0.5 rounded-md bg-gray-100 text-gray-600">${t.kategori}</span>
                  </div>
                </div>
                <div class="text-right shrink-0">
                  <p class="font-semibold text-[15px] ${isMasuk ? 'text-emerald-600' : 'text-red-500'}">${isMasuk ? '+' : '-'} ${formatRupiah(t.jumlah)}</p>
                  <button onclick="deleteTransaksi('${t.id}')" class="mt-1 opacity-0 group-hover:opacity-100 transition-opacity text-[11px] text-gray-400 hover:text-red-500 flex items-center gap-1 ml-auto">
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Hapus
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }
  setTimeout(() => lucide.createIcons(), 0);
}

function getKategoriIcon(kat, isMasuk) {
  const icons = {
    Gaji: 'briefcase', Usaha: 'store', Makan: 'utensils', Transport: 'car',
    Belanja: 'shopping-bag', Tagihan: 'receipt', Lainnya: 'circle-dollar-sign'
  };
  return icons[kat] || (isMasuk ? 'arrow-down-left' : 'arrow-up-right');
}

function formatRupiah(num) {
  return 'Rp ' + new Intl.NumberFormat('id-ID').format(num);
}
function formatRupiahInput(angka) {
  return new Intl.NumberFormat('id-ID').format(angka);
}
function formatTanggalIndo(tgl) {
  return new Date(tgl).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
}

function showToast(msg, isError = false) {
  toastText.textContent = msg;
  toast.querySelector('i').setAttribute('data-lucide', isError ? 'alert-circle' : 'check-circle-2');
  toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
  toast.classList.add('translate-y-0');
  lucide.createIcons();
  setTimeout(() => {
    toast.classList.add('opacity-0', '-translate-y-4');
  }, 2000);
}

function showSyncStatus() {
  syncStatus.classList.remove('opacity-0');
  setTimeout(() => syncStatus.classList.add('opacity-0'), 1500);
}

async function exportPDF() {
  const bulan = filterBulan.value;
  const filtered = keuanganData.filter(t => t.tanggal.startsWith(bulan)).sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));
  
  if (filtered.length === 0) return showToast('Tidak ada data untuk diexport', true);
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ format: 'a4' });
  
  const periode = new Date(bulan + '-01').toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
  
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.setTextColor(16, 185, 129);
  doc.text('Rekap Keuangan', 14, 20);
  
  doc.setFontSize(10);
  doc.setTextColor(100);
  doc.setFont('helvetica', 'normal');
  doc.text(`Periode: ${periode}`, 14, 28);
  doc.text(`Dicetak: ${new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}`, 14, 34);
  
  const tableData = filtered.map(t => [
    formatTanggalIndo(t.tanggal),
    t.tipe === 'masuk' ? 'Masuk' : 'Keluar',
    t.kategori,
    t.keterangan,
    (t.tipe === 'masuk' ? '+ ' : '- ') + formatRupiah(t.jumlah)
  ]);
  
  doc.autoTable({
    startY: 40,
    head: [['Tanggal', 'Tipe', 'Kategori', 'Keterangan', 'Jumlah']],
    body: tableData,
    styles: { fontSize: 9, cellPadding: 3 },
    headStyles: { fillColor: [16, 185, 129], textColor: 255, fontStyle: 'bold' },
    columnStyles: { 4: { halign: 'right' }, 0: { cellWidth: 22 }, 1: { cellWidth: 18 } },
    alternateRowStyles: { fillColor: [249, 250, 251] }
  });
  
  const totalMasuk = filtered.filter(t => t.tipe === 'masuk').reduce((s, t) => s + t.jumlah, 0);
  const totalKeluar = filtered.filter(t => t.tipe === 'keluar').reduce((s, t) => s + t.jumlah, 0);
  const finalY = doc.lastAutoTable.finalY + 10;
  
  doc.setFontSize(11);
  doc.setTextColor(40);
  doc.text(`Total Pemasukan:`, 14, finalY);
  doc.text(`Total Pengeluaran:`, 14, finalY + 7);
  doc.setFont('helvetica', 'bold');
  doc.text(`Saldo Akhir:`, 14, finalY + 14);
  
  doc.setFont('helvetica', 'normal');
  doc.text(formatRupiah(totalMasuk), 60, finalY, { align: 'left' });
  doc.text(formatRupiah(totalKeluar), 60, finalY + 7, { align: 'left' });
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(16, 185, 129);
  doc.text(formatRupiah(totalMasuk - totalKeluar), 60, finalY + 14, { align: 'left' });
  
  doc.save(`rekap-keuangan-${bulan}.pdf`);
  showToast('PDF berhasil diexport');
}

async function syncToGAS() {
  if (!GAS_URL) return;
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'sync', data: keuanganData, timestamp: Date.now() })
    });
  } catch (e) { console.warn('Sync gagal:', e); }
}

async function loadFromGAS() {
  if (!GAS_URL) return;
  try {
    const res = await fetch(`${GAS_URL}?action=get&t=${Date.now()}`);
    if (!res.ok) return;
    const remote = await res.json();
    if (Array.isArray(remote) && remote.length > 0) {
      keuanganData = remote;
      saveData(false);
      render();
      showToast('Data disinkronkan dari cloud');
    }
  } catch (e) { console.warn('Load GAS gagal:', e); }
}

document.addEventListener('DOMContentLoaded', init);
window.deleteTransaksi = deleteTransaksi;
</script>
</body>
